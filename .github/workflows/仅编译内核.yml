name: 仅编译内核

on:
  workflow_dispatch:

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 最大化构建空间
        uses: easimon/maximize-build-space@master
        with:
          remove_dotnet: true
          remove_android: true
          remove_haskell: true
          remove_codeql: true
          root_reserve_space: 10GB
          swap_size: 10GB

      - name: 安装编译依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev ccache &

      - name: 拉取Proton Clang编译链
        run: |
          # 拉取较新的Proton Clang（支持RELr.dyn）
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          # 将自定义clang加入环境变量
          echo "CLANG_PATH=$(pwd)/clang/bin" >> $GITHUB_ENV
          echo "PATH=$(pwd)/clang/bin:$PATH" >> $GITHUB_ENV
          # 配置交叉编译前缀
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV

      - name: 拉取内核源码
        run: |
          git clone https://github.com/kquieter-debug/Kernel_Oneplus_MT6897.git --depth=1 -b oneplus/mt6897_b_16.0.0_nord_ce5 oneplus_kernel
          cd oneplus_kernel
          ls -la

      - name: 生成配置 & 编译内核
        run: |
          cd oneplus_kernel
          # 创建编译输出目录
          mkdir -p out
          
          # 生成gki_defconfig配置（关键修改：改用系统ld或新版lld，增加环境变量）
          echo "===== 开始生成配置文件 ====="
          # 临时禁用RELr.dyn检测（兼容旧链接器）
          export LDFLAGS="-Wl,--no-relr"
          # 优先使用系统ld，而非clang自带的ld.lld
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig &&
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image
          # 验证编译产物是否生成
          echo "===== 编译产物列表 ====="
          ls -la out/arch/arm64/boot/ || echo "编译产物未生成，请检查compile.log"

      - name: AnyKernel3打包内核
        run: |
          # 克隆AnyKernel3仓库
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
          
          # 拷贝编译好的内核镜像到AnyKernel3目录
          cp oneplus_kernel/out/arch/arm64/boot/Image.gz-dtb anykernel/ || echo "内核镜像不存在，拷贝失败"
          
          # 修改AnyKernel3配置（适配设备）
          cd anykernel
          # 关闭设备检测、自动选择分区
          sed -i 's/device.name1=.*/device.name1=*/' anykernel.sh
          sed -i 's/block=/block=auto/' anykernel.sh
          sed -i 's/is_slot_device=0/is_slot_device=auto/' anykernel.sh
          
          # 打包为ZIP文件
          zip -r9 oneplus_kernel_nord_ce5.zip * -x .git README.md *.zip
          
          # 验证打包产物
          ls -la *.zip

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: oneplus_kernel_nord_ce5
          path: |
            anykernel/oneplus_kernel_nord_ce5.zip
            oneplus_kernel/compile.log  # 上传编译日志，方便排查问题
          retention-days: 7

      - name: 清理构建产物
        if: always()  
        run: |
          rm -rf oneplus_kernel clang anykernel
          sudo rm -rf /tmp/ccache